server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Single Page Application : toutes les routes renvoient index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache des assets statiques
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
